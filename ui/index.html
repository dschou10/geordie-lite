<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Activity Monitor</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0f; color: #d4d4d8; padding: 32px 40px; }

    h1 { font-size: 1rem; color: #52525b; margin-bottom: 28px; letter-spacing: 0.12em; text-transform: uppercase; }

    .run-form { display: flex; gap: 10px; margin-bottom: 8px; }
    .run-form input {
      flex: 1; padding: 10px 14px; background: #111118; border: 1px solid #27272a;
      color: #e4e4e7; font-family: inherit; font-size: 0.875rem; border-radius: 6px;
      outline: none; transition: border-color 0.15s;
    }
    .run-form input:focus { border-color: #3b82f6; }
    .run-form button {
      padding: 10px 20px; background: #1d4ed8; border: none; color: #fff;
      font-family: inherit; font-size: 0.875rem; border-radius: 6px; cursor: pointer;
      letter-spacing: 0.04em; transition: background 0.15s;
    }
    .run-form button:hover { background: #2563eb; }

    #status { font-size: 0.78rem; color: #52525b; margin-bottom: 16px; min-height: 1.4em; }

    .tabs { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid #1e1e2e; }
    .tab {
      padding: 8px 16px; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: #52525b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
      background: none; border-top: none; border-left: none; border-right: none; font-family: inherit;
    }
    .tab.active { color: #e4e4e7; border-bottom-color: #3b82f6; }

    .panel { display: none; }
    .panel.active { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead tr { border-bottom: 1px solid #1e1e2e; }
    th {
      text-align: left; padding: 8px 12px; color: #3f3f46;
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;
    }
    td { padding: 9px 12px; border-bottom: 1px solid #111118; vertical-align: middle; white-space: nowrap; }
    tr:hover td { background: #0f0f1a; }
    .violation-row:hover td { background: #110f1a; cursor: pointer; }

    .agent    { color: #60a5fa; }
    .tool     { color: #86efac; }
    .ms       { color: #52525b; }
    .ts       { color: #3f3f46; font-size: 0.75rem; }
    .trace-id { color: #3f3f46; font-size: 0.75rem; }
    .standard { color: #a78bfa; font-size: 0.7rem; }
    .flag-yes { color: #f87171; font-weight: 600; }
    .flag-no  { color: #27272a; }

    /* Detail inspector */
    .detail-row td { padding: 0; border-bottom: 1px solid #1e1e2e; }
    .detail-box {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: #1e1e2e; border-top: 1px solid #1e1e2e;
    }
    .detail-col { background: #0d0d18; padding: 14px 16px; }
    .detail-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #3f3f46; margin-bottom: 8px; }
    .detail-col pre {
      font-size: 0.75rem; color: #a1a1aa; white-space: pre-wrap; word-break: break-word;
      max-height: 180px; overflow-y: auto;
    }

    /* Violations filter bar */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
    .filter-bar span { font-size: 0.7rem; color: #52525b; letter-spacing: 0.08em; text-transform: uppercase; }
    .sev-btn {
      padding: 4px 12px; border-radius: 4px; border: 1px solid #27272a; background: none;
      font-family: inherit; font-size: 0.72rem; cursor: pointer; color: #71717a; transition: all 0.15s;
    }
    .sev-btn:hover, .sev-btn.active { border-color: #3b82f6; color: #e4e4e7; background: #1e1e3a; }
    .sev-btn.critical { border-color: #f87171; color: #f87171; }
    .sev-btn.high     { border-color: #fb923c; color: #fb923c; }
    .sev-btn.medium   { border-color: #facc15; color: #facc15; }
    .sev-btn.low      { border-color: #86efac; color: #86efac; }

    /* Posture & stats */
    .posture-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .agent-card { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 20px; }
    .agent-card h3 { color: #60a5fa; font-size: 0.85rem; margin-bottom: 14px; letter-spacing: 0.06em; }
    .posture-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.78rem; }
    .posture-label { color: #52525b; }
    .posture-value { color: #e4e4e7; }
    .posture-value.green { color: #86efac; }
    .posture-value.purple { color: #a78bfa; }
    .standards-table { margin-top: 8px; }
    .standards-table th { color: #3f3f46; }
  </style>
</head>
<body>
  <h1>⬡ agent activity monitor</h1>

  <form class="run-form"
        hx-post="/run"
        hx-target="#status"
        hx-swap="innerHTML"
        hx-ext="json-enc"
        hx-on::after-request="htmx.trigger(document.body, 'refresh')">
    <input type="text" name="query" placeholder="Enter a research query…" required>
    <button type="submit">▶ Run</button>
  </form>
  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="sev-btn"
            hx-post="/clear"
            hx-target="#status"
            hx-swap="innerHTML"
            style="font-size:0.72rem">⊘ clear events</button>
  </div>

  <div id="status"></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('events', this)">Event Feed</button>
    <button class="tab" onclick="showTab('traces', this)">Traces</button>
    <button class="tab" onclick="showTab('violations', this)">Violations</button>
    <button class="tab" onclick="showTab('graph', this)">Graph</button>
    <button class="tab" onclick="showTab('posture', this)">Posture</button>
    <button class="tab" onclick="showTab('stats', this)">Stats</button>
  </div>

  <!-- Event Feed -->
  <div id="events" class="panel active">
    <table>
      <thead>
        <tr>
          <th>time</th><th>trace</th><th>agent</th><th>event</th>
          <th>tool</th><th>duration</th><th>severity</th><th>risk</th><th>standard</th>
        </tr>
      </thead>
      <tbody id="feed"
             hx-get="/events/rows"
             hx-trigger="load, every 5s, refresh from:body"
             hx-swap="innerHTML">
      </tbody>
    </table>
  </div>

  <!-- Traces rollup -->
  <div id="traces" class="panel">
    <table>
      <thead>
        <tr><th>started</th><th>trace</th><th>events</th><th>severity</th><th>action</th></tr>
      </thead>
      <tbody id="trace-feed"
             hx-get="/traces/rows"
             hx-trigger="load, every 5s, refresh from:body"
             hx-swap="innerHTML">
      </tbody>
    </table>
  </div>

  <!-- Violations log -->
  <div id="violations" class="panel">
    <div class="filter-bar">
      <span>filter:</span>
      <button class="sev-btn active" onclick="filterViolations('', this)">all</button>
      <button class="sev-btn critical" onclick="filterViolations('critical', this)">critical</button>
      <button class="sev-btn high" onclick="filterViolations('high', this)">high</button>
      <button class="sev-btn medium" onclick="filterViolations('medium', this)">medium</button>
      <button class="sev-btn low" onclick="filterViolations('low', this)">low</button>
      <span style="margin-left:auto;display:flex;gap:6px">
        <a id="export-json" href="/export/violations.json" class="sev-btn" style="text-decoration:none">↓ JSON</a>
        <a id="export-csv" href="/export/violations.csv" class="sev-btn" style="text-decoration:none">↓ CSV</a>
      </span>
    </div>
    <table>
      <thead>
        <tr>
          <th>time</th><th>trace</th><th>agent</th><th>event</th>
          <th>tool</th><th>duration</th><th>severity</th><th>risk</th><th>standard</th>
        </tr>
      </thead>
      <tbody id="violations-feed"
             hx-get="/events/violations"
             hx-trigger="load, refresh from:body"
             hx-swap="innerHTML">
      </tbody>
    </table>
  </div>

  <!-- Graph -->
  <div id="graph" class="panel">
    <div id="graph-content"
         hx-get="/graph/panel"
         hx-trigger="load, every 1s"
         hx-swap="innerHTML">Loading…</div>
  </div>

  <!-- Posture -->
  <div id="posture" class="panel">
    <div id="posture-content"
         hx-get="/posture/panel"
         hx-trigger="load"
         hx-swap="innerHTML">Loading…</div>
  </div>

  <!-- Stats -->
  <div id="stats" class="panel">
    <div id="stats-content"
         hx-get="/stats/panel"
         hx-trigger="load, every 5s, refresh from:body"
         hx-swap="innerHTML">Loading…</div>
  </div>

  <script>
    function renderStatus(data) {
      if (!data || !data.trace_id) return;
      const color = data.aborted ? '#f87171' : '#86efac';
      const icon = data.aborted ? '✕' : '✓';
      const clean = (data.summary || '').replace(/[#*`_]/g, '').replace(/\s+/g, ' ').trim();
      const short = clean.length > 120 ? clean.slice(0, 120).replace(/\s\S+$/, '') + '…' : clean;
      document.getElementById('status').innerHTML =
        `<span style="color:${color}">${icon} trace ${data.trace_id.slice(0,8)}… — ${short}</span>`;
    }

    fetch('/last-run').then(r => r.json()).then(renderStatus).catch(() => {});

    function showTab(id, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function filterViolations(severity, btn) {
      document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const qs = severity ? `?severity=${severity}` : '';
      htmx.ajax('GET', `/events/violations${qs}`, {target: '#violations-feed', swap: 'innerHTML'});
      document.getElementById('export-json').href = `/export/violations.json${qs}`;
      document.getElementById('export-csv').href = `/export/violations.csv${qs}`;
    }

    function toggleDetail(rowId) {
      const row = document.getElementById(rowId);
      if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    }

    function toggleTimeline(rowId, traceId) {
      const row = document.getElementById(rowId);
      if (!row) return;
      if (row.style.display !== 'none') { row.style.display = 'none'; return; }
      row.style.display = 'table-row';
      if (!row.dataset.loaded) {
        htmx.ajax('GET', `/traces/${traceId}/timeline`, {target: `#${rowId} td`, swap: 'innerHTML'});
        row.dataset.loaded = '1';
      }
    }

    document.body.addEventListener('htmx:afterRequest', function(evt) {
      if (evt.detail.pathInfo && evt.detail.pathInfo.requestPath === '/run') {
        try {
          const data = JSON.parse(evt.detail.xhr.responseText);
          const aborted = data.summary.startsWith('[aborted');
          const color = aborted ? '#f87171' : '#86efac';
          const icon = aborted ? '✕' : '✓';
          const clean = data.summary.replace(/[#*`_]/g, '').replace(/\s+/g, ' ').trim();
          const short = clean.length > 120 ? clean.slice(0, 120).replace(/\s\S+$/, '') + '…' : clean;
          evt.detail.target.innerHTML =
            `<span style="color:${color}">${icon} trace ${data.trace_id.slice(0,8)}… — ${short}</span>`;
        } catch(e) {}
      }
    });

    // SSE: refresh feed panels instantly on server push
    (function connectSSE() {
      const es = new EventSource('/stream');
      es.addEventListener('trace_complete', () => {
        htmx.trigger('#feed', 'refresh');
        htmx.trigger('#trace-feed', 'refresh');
        htmx.trigger('#stats-content', 'refresh');
        htmx.trigger('#graph-content', 'refresh');
      });
      es.addEventListener('flagged_event', () => {
        htmx.trigger('#violations-feed', 'refresh');
        htmx.trigger('#stats-content', 'refresh');
      });
      es.addEventListener('pipeline_state', () => {
        htmx.trigger('#graph-content', 'refresh');
      });
      es.onopen = () => {
        htmx.trigger('#feed', 'refresh');
        htmx.trigger('#trace-feed', 'refresh');
        htmx.trigger('#stats-content', 'refresh');
        htmx.trigger('#graph-content', 'refresh');
        htmx.trigger('#violations-feed', 'refresh');
      };
      es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
    })();
  </script>
</body>
</html>
